name: Deploy Backend

on:
  push:
    branches: [master]
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma Client
        working-directory: backend
        run: npx prisma generate

      - name: Build
        working-directory: backend
        run: npm run build

      - name: Deploy to Render
        uses: breachthirty/render-deploy@v1
        with:
          render-deploy-token: ${{ secrets.RENDER_DEPLOY_TOKEN }}
          service-id: ${{ secrets.RENDER_SERVICE_ID }}
          environment-id: ${{ secrets.RENDER_ENVIRONMENT_ID }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRE: 15m
          FRONTEND_URL: https://dwarkeshfood.vercel.app
          NODE_ENV: production